<!DOCTYPE html>
<html>
<head>
    <title>JS Module Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            border: none;
            background: #4e73df;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #2e59d9;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            color: #1cc88a;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculator (JS Modules)</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">

    <div>
        <button id="divideBtn">Divide</button>
        <button id="multiplyBtn">Multiply</button>
        <button id="subtractBtn">Subtract</button>
    </div>

    <div id="result">Result:</div>
</div>

<!-- JavaScript Module -->
<script type="module">
    import { divide, multiply, subtract } from "./mathOperations.js";

    const num1 = document.getElementById("num1");
    const num2 = document.getElementById("num2");
    const result = document.getElementById("result");

    document.getElementById("divideBtn").addEventListener("click", () => {
        result.textContent = "Result: " + divide(+num1.value, +num2.value);
    });

    document.getElementById("multiplyBtn").addEventListener("click", () => {
        result.textContent = "Result: " + multiply(+num1.value, +num2.value);
    });

    document.getElementById("subtractBtn").addEventListener("click", () => {
        result.textContent = "Result: " + subtract(+num1.value, +num2.value);
    });
</script>

</body>
</html>
